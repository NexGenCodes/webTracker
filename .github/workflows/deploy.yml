name: Deploy to AWS EC2 (Bare Metal)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Build Binary
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bot ./cmd/server/main.go

      - name: Upload Binary and Service File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "backend/bot,backend/webtracker-bot.service,backend/assets/**"
          target: "/tmp"
          strip_components: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Setup Directories & Caddy
            sudo mkdir -p /opt/webtracker/assets
            
            if ! command -v caddy &> /dev/null; then
              echo "Installing Caddy..."
              sudo apt update
              sudo apt install -y debian-keyring debian-archive-keyring apt-transport-https
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
              sudo apt update
              sudo apt install -y caddy
              
              # Set up nip.io mapping for Caddy automatically
              VPS_IP=$(curl -s ifconfig.me)
              echo "${VPS_IP//./-}.nip.io { reverse_proxy localhost:8080 }" | sudo tee /etc/caddy/Caddyfile
              sudo systemctl restart caddy
            fi

            # 2. Stop existing service if running
            sudo systemctl stop webtracker-bot || true
            
            # 3. Move & Sync Files
            sudo cp -r /tmp/assets/* /opt/webtracker/assets/
            sudo mv /tmp/bot /opt/webtracker/bot
            sudo chmod +x /opt/webtracker/bot
            sudo mv /tmp/webtracker-bot.service /etc/systemd/system/webtracker-bot.service
            
            # 4. Systemd Reload & Start
            sudo systemctl daemon-reload
            sudo systemctl enable webtracker-bot
            sudo systemctl restart webtracker-bot
            
            # 5. Verify
            systemctl is-active webtracker-bot
            sudo tail -n 20 /opt/webtracker/logs/bot.log
