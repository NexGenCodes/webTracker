name: Deploy to AWS EC2 (Bare Metal)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Build Binary
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bot ./cmd/bot/main.go

      - name: Upload Binary and Service File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "backend/bot,backend/webtracker-bot.service"
          target: "/tmp"
          strip_components: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Setup Directories
            sudo mkdir -p /opt/webtracker/assets
            
            # 2. Stop existing service if running
            sudo systemctl stop webtracker-bot || true
            
            # 3. Move Files
            sudo mv /tmp/bot /opt/webtracker/bot
            sudo chmod +x /opt/webtracker/bot
            sudo mv /tmp/webtracker-bot.service /etc/systemd/system/webtracker-bot.service
            
            # 4. Systemd Reload & Start
            sudo systemctl daemon-reload
            sudo systemctl enable webtracker-bot
            sudo systemctl restart webtracker-bot
            
            # 5. Verify
            systemctl is-active webtracker-bot
            tail -n 20 /opt/webtracker/logs/bot.log
